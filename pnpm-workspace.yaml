packages:
  - '!**/.*/**'
  - '!**/artifacts/**'
  - 'packages/*'
  - 'src/assets'
  - 'common-features'
  - 'common-features/src/*'
  - 'serene/src/Serene.Web'

allowBuilds:
  core-js: true
  esbuild: true
  msw: true

catalogs:
  serenity:
    "@floating-ui/dom": "1.7.6"
    "@preact/signals-core": "1.14.3"
    "@vitest/coverage-v8": "4.1.9"
    "chart.js": "4.5.1"
    "dompurify": "3.4.11"
    "dts-bundle-generator": "9.5.1"
    "esbuild": "0.28.1"
    "es-module-lexer": "2.1.0"
    "flatpickr": "4.6.13"
    "glightbox": "3.3.1"
    "jsdom": "29.1.1"
    "moment": "2.30.1"
    "preact": "10.29.3"
    "tinyglobby": "0.2.17"
    "typescript": "6.0.3"
    "vite": "8.1.0"
    "vitest": "4.1.9"

overrides:
  dompurify@<3.4.11: ^3.4.11
  undici@<7.28.0: ^7.28.0
